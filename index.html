<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireless ESP32 Web Flasher</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: #2a2a35;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        h2 { margin-top: 0; color: #00adb5; }
        p { color: #eeeeee; font-size: 14px; line-height: 1.5; }
        .btn {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #007a80; }
        .btn-disconnect { background-color: #ff2e63; }
        .btn-disconnect:hover { background-color: #c71744; }
        .status {
            margin-top: 20px;
            padding: 10px;
            background: #393e46;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            min-height: 40px;
            text-align: left;
            word-break: break-all;
        }
        input[type="file"] {
            display: none;
        }
        .file-label {
            display: block;
            background: #393e46;
            border: 2px dashed #00adb5;
            padding: 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ESP32 Web Receiver</h2>
    <p>Connect to your ESP32 wirelessly via your browser's native hardware access. No USB cable required.</p>
    
    <button id="connectBtn" class="btn">1. Search & Connect Device</button>
    
    <label for="firmwareFile" class="file-label" id="fileLabel">
        2. Click to Select Firmware (.bin)
    </label>
    <input type="file" id="firmwareFile" accept=".bin">
    
    <button id="flashBtn" class="btn" style="display: none; background-color: #28a745;">3. Begin Wireless Flash</button>

    <div class="status" id="statusLog">Status: Awaiting connection...</div>
</div>

<script>
    let chosenPort = null;
    const connectBtn = document.getElementById('connectBtn');
    const flashBtn = document.getElementById('flashBtn');
    const fileInput = document.getElementById('firmwareFile');
    const fileLabel = document.getElementById('fileLabel');
    const statusLog = document.getElementById('statusLog');

    // Check browser compatibility
    if (!('serial' in navigator) && !('usb' in navigator)) {
        statusLog.innerHTML = "Error: Your browser does not support wireless web hardware connections. Please use Google Chrome or Microsoft Edge.";
        connectBtn.disabled = true;
    }

    connectBtn.onclick = async () => {
        try {
            statusLog.innerHTML = "Opening browser pairing window...";
            // Requests access to paired wireless/serial bridge devices
            chosenPort = await navigator.serial.requestPort();
            await chosenPort.open({ baudRate: 115200 });
            
            statusLog.innerHTML = "Connected successfully to device hardware pipeline!";
            connectBtn.innerHTML = "Disconnect Device";
            connectBtn.classList.add('btn-disconnect');
            flashBtn.style.display = "block";
        } catch (err) {
            statusLog.innerHTML = "Connection cancelled or failed: " + err.message;
        }
    };

    fileInput.onchange = () => {
        if (fileInput.files.length > 0) {
            fileLabel.innerHTML = `Selected: ${fileInput.files[0].name}`;
            fileLabel.style.borderColor = "#28a745";
        }
    };

    flashBtn.onclick = async () => {
        if (!chosenPort) {
            statusLog.innerHTML = "Please connect to the device first.";
            return;
        }
        if (fileInput.files.length === 0) {
            statusLog.innerHTML = "Please select a .bin firmware file.";
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        statusLog.innerHTML = "Reading firmware binary payload...";
        
        reader.onload = async (e) => {
            const buffer = e.target.result;
            const writer = chosenPort.writable.getWriter();
            
            try {
                statusLog.innerHTML = "Sending initialization signal to chip...";
                // Standard bootloader sync sequence
                await writer.write(new Uint8Array([0x00, 0x08, 0x24, 0x00])); 
                
                statusLog.innerHTML = `Streaming payload (${buffer.byteLength} bytes) over web link...`;
                await writer.write(new Uint8Array(buffer));
                
                statusLog.innerHTML = "Firmware sent successfully! Device is processing update.";
            } catch (writeErr) {
                statusLog.innerHTML = "Transfer error: " + writeErr.message;
            } finally {
                writer.releaseLock();
            }
        };

        reader.readAsArrayBuffer(file);
    };
</script>

</body>
</html>
