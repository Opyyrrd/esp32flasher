<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 USB Web Flasher</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .card {
            background: #2a2a35;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            max-width: 450px;
            width: 100%;
        }
        h2 { margin-top: 0; color: #00adb5; text-align: center; }
        p { font-size: 14px; color: #ccc; text-align: center; line-height: 1.4; }
        .btn {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
        }
        .btn:hover { background-color: #007a80; }
        .btn:disabled { background-color: #555; cursor: not-allowed; }
        .form-group { margin-top: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #ccc; }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background: #393e46;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
        }
        #progress-container { margin-top: 25px; display: none; }
        #progress-bar { width: 100%; background-color: #444; border-radius: 4px; overflow: hidden; }
        #progress-fill { width: 0%; height: 22px; background-color: #28a745; text-align: center; color: white; line-height: 22px; font-size: 14px; font-weight: bold; }
        .terminal {
            margin-top: 20px;
            background: #111;
            color: #00ff00;
            font-family: monospace;
            padding: 15px;
            border-radius: 4px;
            height: 120px;
            overflow-y: auto;
            font-size: 12px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>USB Firmware Flasher</h2>
    <p>Connect your ESP32 to your computer via USB, select your firmware binary, and flash it directly.</p>

    <div class="form-group">
        <label>1. Select Firmware Binary:</label>
        <input type="file" id="firmwareFile" accept=".bin">
    </div>

    <button id="flashBtn" class="btn">2. Connect & Flash Device</button>

    <div id="progress-container">
        <label>Flashing Progress:</label>
        <div id="progress-bar">
            <div id="progress-fill">0%</div>
        </div>
    </div>

    <div class="terminal" id="termLog">System Status: Ready. Plug in your ESP32.</div>
</div>

<script type="module">
    import { ESPLoader, Transport } from "https://unpkg.com/esptool-js@0.5.7/bundle.js";

    const flashBtn = document.getElementById('flashBtn');
    const fileInput = document.getElementById('firmwareFile');
    const termLog = document.getElementById('termLog');
    const progressContainer = document.getElementById('progress-container');
    const progressFill = document.getElementById('progress-fill');

    // Test for browser compatibility
    if (!('serial' in navigator)) {
        termLog.innerHTML = "ERROR: Your browser does not support Web Serial. Please use Google Chrome or Microsoft Edge.";
        flashBtn.disabled = true;
    }

    // Custom logger helper for the underlying flasher utility
    const customTerminal = {
        clean: () => { termLog.innerHTML = ""; },
        writeLine: (data) => { termLog.innerHTML += data + "\n"; termLog.scrollTop = termLog.scrollHeight; },
        write: (data) => { termLog.innerHTML += data; termLog.scrollTop = termLog.scrollHeight; }
    };

    flashBtn.onclick = async () => {
        if (fileInput.files.length === 0) {
            alert("Please select a valid .bin firmware file first!");
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = async function(e) {
            const firmwareArrayBuffer = new Uint8Array(e.target.result);
            let device = null;
            let transport = null;
            let esploader = null;

            try {
                flashBtn.disabled = true;
                customTerminal.clean();
                customTerminal.writeLine("Opening serial connection dialog...");

                // Open the browser window to pick the COM port
                device = await navigator.serial.requestPort({});
                transport = new Transport(device, true);
                
                // Initialize the bootloader connection environment
                esploader = new ESPLoader({
                    transport: transport,
                    baudrate: 115200,
                    terminal: customTerminal
                });

                customTerminal.writeLine("Connecting to chip... (If stuck, hold the BOOT button on the board)");
                const chipName = await esploader.main();
                customTerminal.writeLine(`Detected Architecture: ${chipName}`);

                // Open up the progress monitor UI element
                progressContainer.style.display = 'block';
                progressFill.style.width = '0%';
                progressFill.innerHTML = '0%';

                // Configure flash layout settings
                const flashOptions = {
                    fileArray: [{
                        data: firmwareArrayBuffer,
                        address: 0x10000 // Standard factory app partition offset for Arduino ESP32 builds
                    }],
                    flashSize: "4MB",
                    flashMode: "dio",
                    flashFreq: "40m",
                    eraseAll: false,
                    compress: true,
                    reportProgress: (fileIndex, written, total) => {
                        const percent = Math.floor((written / total) * 100);
                        progressFill.style.width = percent + '%';
                        progressFill.innerHTML = percent + '%';
                    }
                };

                customTerminal.writeLine("Writing binary data to flash memory block...");
                await esploader.writeFlash(flashOptions);
                
                customTerminal.writeLine("\nFlashing Complete! Rebooting hardware...");
                await esploader.after("hard_reset");

            } catch (err) {
                customTerminal.writeLine(`\n[Execution Error]: ${err.message}`);
            } finally {
                flashBtn.disabled = false;
                if (transport) {
                    await transport.disconnect();
                }
            }
        };

        reader.readAsArrayBuffer(file);
    };
</script>

</body>
</html>
