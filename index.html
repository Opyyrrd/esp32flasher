<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireless ESP32 Wi-Fi Flasher</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .card {
            background: #2a2a35;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        h2 { margin-top: 0; color: #00adb5; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #ccc; }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #444;
            background-color: #393e46;
            color: white;
            border-radius: 4px;
        }
        input[type="submit"] {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
        }
        input[type="submit"]:hover { background-color: #218838; }
        #progress-container { margin-top: 20px; display: none; }
        #progress-bar { width: 100%; background-color: #444; border-radius: 4px; overflow: hidden; }
        #progress-fill { width: 0%; height: 20px; background-color: #00adb5; text-align: center; color: white; line-height: 20px; font-size: 14px; }
        #status { margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>Wireless Wi-Fi Flasher</h2>
    <form id="uploadForm">
        <div class="form-group">
            <label for="ipAddress">ESP32 IP Address:</label>
            <input type="text" id="ipAddress" placeholder="e.g., 192.168.1.50" required>
        </div>
        
        <div class="form-group">
            <label for="firmwareFile">Select Firmware (.bin):</label>
            <input type="file" id="firmwareFile" accept=".bin" required>
        </div>
        
        <input type="submit" value="Broadcast Flash Wirelessly">
    </form>

    <div id="progress-container">
        <label>Upload Progress:</label>
        <div id="progress-bar">
            <div id="progress-fill">0%</div>
        </div>
    </div>

    <div id="status"></div>
</div>

<script>
    document.getElementById('uploadForm').onsubmit = function(e) {
        e.preventDefault();

        const ip = document.getElementById('ipAddress').value.trim();
        const fileInput = document.getElementById('firmwareFile');
        const statusDiv = document.getElementById('status');
        const progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill');

        // Clean up IP mapping
        let cleanIP = ip.replace(/^(https?:\/\/)?/, "").replace(/\/$/, "");

        const formData = new FormData();
        formData.append('update', fileInput.files[0]);

        const xhr = new XMLHttpRequest();
        xhr.open('POST', `http://${cleanIP}/update`, true);

        progressContainer.style.display = 'block';
        xhr.upload.onprogress = function(e) {
            if (e.lengthComputable) {
                const percentage = Math.floor((e.loaded / e.total) * 100);
                progressFill.style.width = percentage + '%';
                progressFill.innerHTML = percentage + '%';
            }
        };

        xhr.onload = function() {
            if (xhr.status === 200) {
                statusDiv.innerHTML = "<span style='color: #28a745;'>Success! Firmware sent. Board is rebooting.</span>";
            } else {
                statusDiv.innerHTML = `<span style='color: #ff2e63;'>Error ${xhr.status}: Flash failed.</span>`;
            }
        };

        xhr.onerror = function() {
            statusDiv.innerHTML = "<span style='color: #ff2e63;'>Network error. Ensure the ESP32 is powered on and on your Wi-Fi network.</span>";
        };

        statusDiv.innerHTML = "Streaming firmware over Wi-Fi...";
        xhr.send(formData);
    };
</script>

</body>
</html>
